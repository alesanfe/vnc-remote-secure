version: '3.8'

services:
  # noVNC service for integration testing
  novnc:
    image: fredrikwallberg/novnc:latest
    ports:
      - "6080:6080"
    environment:
      - VNC_HOST=vnc
      - VNC_PORT=5900
    depends_on:
      - vnc
    networks:
      - vnc-network

  # VNC server for integration testing
  vnc:
    image: danielguerra/ubuntu-xvnc:latest
    ports:
      - "5900:5900"
    environment:
      - DISPLAY=:1
      - VNC_PASSWORD=password
    networks:
      - vnc-network

  # ttyd for terminal testing
  ttyd:
    image: tsl0922/ttyd:latest
    ports:
      - "5000:7681"
    command: ttyd -p 7681 bash
    networks:
      - vnc-network

  # nginx reverse proxy for testing
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src/config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/ssl:/etc/nginx/ssl:ro
    depends_on:
      - novnc
      - ttyd
    networks:
      - vnc-network

networks:
  vnc-network:
    driver: bridge
